version: '3'

tasks:
  run:
    desc: Build and launch Threadmill (restarts Spindle if needed)
    cmds:
      - task: build
      - task: spindle:restart
      - task: open

  run:app:
    desc: Build and launch Threadmill without restarting Spindle
    cmds:
      - task: build
      - task: open

  open:
    desc: Open the packaged Threadmill app
    cmds:
      - task: app:bundle
      - open .build/debug/Threadmill.app

  app:bundle:
    desc: Package Threadmill as a macOS app bundle
    cmds:
      - bash Scripts/package_app.sh

  spindle:restart:
    desc: Rebuild and restart Spindle daemon on beast
    cmds:
      - task: build:spindle
      - ssh beast "systemctl --user restart spindle"
      - task: spindle:status

  spindle:logs:
    desc: Tail Spindle service logs on beast
    cmds:
      - ssh beast "journalctl --user -u spindle -f --no-pager -n 50"

  spindle:status:
    desc: Show Spindle service status on beast
    cmds:
      - ssh beast "systemctl --user is-active spindle"
      - ssh beast "systemctl --user status spindle --no-pager"

  test:
    desc: Run all tests (Swift + Spindle)
    cmds:
      - task: test:swift
      - task: test:spindle

  test:swift:
    desc: Run Threadmill Swift unit tests
    cmds:
      - swift test

  test:spindle:
    desc: Run Spindle integration tests on beast
    cmds:
      - ssh beast "cd /home/wsl/dev/spindle && ~/.cargo/bin/cargo test"

  test:ui:
    desc: Run UI e2e tests (requires Accessibility permission)
    env:
      THREADMILL_RUN_UI_E2E: "1"
    cmds:
      - swift test --filter ThreadmillUITests

  build:
    desc: Build Threadmill
    cmds:
      - swift build

  build:spindle:
    desc: Build Spindle on beast
    cmds:
      - ssh beast "cd /home/wsl/dev/spindle && ~/.cargo/bin/cargo build"

  cli:build:
    desc: Build threadmill-cli on beast
    cmds:
      - ssh beast "cd /home/wsl/dev/spindle && ~/.cargo/bin/cargo build --bin threadmill-cli"

  cli:install:
    desc: Install threadmill-cli symlink on beast
    cmds:
      - ssh beast "ln -sf /home/wsl/dev/spindle/target/debug/threadmill-cli ~/.local/bin/threadmill-cli"

  build:all:
    desc: Build both Threadmill and Spindle
    cmds:
      - task: build
      - task: build:spindle

  validate:
    desc: Full validation gate (build all + test all)
    cmds:
      - task: build:all
      - task: test
